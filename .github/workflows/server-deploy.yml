name: Server · Deploy docs

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to deploy (leave blank for latest)'
        required: false
        type: string
      force:
        description: 'Force re-extract + restart even if already on target tag'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: server-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Trigger deploy on flexiui.com
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/common-actions/require-admin

      - name: Compose remote command
        id: cmd
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_FORCE: ${{ inputs.force }}
        run: |
          CMD="cd /opt/deployment-scripts/flexi-ui && ./deploy.sh"
          if [[ -n "$INPUT_TAG" ]]; then CMD="$CMD --tag $INPUT_TAG"; fi
          if [[ "$INPUT_FORCE" == "true" ]]; then CMD="$CMD --force"; fi
          echo "command=$CMD" >> "$GITHUB_OUTPUT"

      - uses: ./.github/common-actions/ssh-deploy-host
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          user: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
          command: ${{ steps.cmd.outputs.command }}
