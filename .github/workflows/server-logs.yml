name: Server · Logs

on:
  workflow_dispatch:
    inputs:
      lines:
        description: 'Number of log lines to fetch'
        required: false
        type: string
        default: '200'
      stream:
        description: 'Which log stream'
        required: false
        type: choice
        default: 'both'
        options:
          - both
          - out
          - err

permissions:
  contents: read

jobs:
  logs:
    name: Tail flexi-documentation logs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/common-actions/require-admin

      - name: Compose remote command
        id: cmd
        env:
          LINES: ${{ inputs.lines }}
          STREAM: ${{ inputs.stream }}
        run: |
          # Sanitize lines to a positive integer.
          if ! [[ "$LINES" =~ ^[0-9]+$ ]] || [[ "$LINES" -lt 1 ]] || [[ "$LINES" -gt 5000 ]]; then
            LINES=200
          fi
          case "$STREAM" in
            out) FLAG="--out" ;;
            err) FLAG="--err" ;;
            *)   FLAG="" ;;
          esac
          echo "command=pm2 logs flexi-documentation --lines $LINES --nostream $FLAG" >> "$GITHUB_OUTPUT"

      - uses: ./.github/common-actions/ssh-deploy-host
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          user: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
          command: ${{ steps.cmd.outputs.command }}
