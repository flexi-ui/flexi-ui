name: Docs Bundle

on:
  push:
    branches:
      - main
    paths:
      - 'apps/documentation/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-docs.yml'
      - '.github/common-actions/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-bundle-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bundle:
    name: Build and publish docs bundle
    # Skip self-triggered "bump version" commits so we don't loop.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Require admin (manual trigger only)
        uses: ./.github/common-actions/require-admin

      - name: Install
        uses: ./.github/common-actions/install

      - name: Bump docs patch if packages changed
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PKG=apps/documentation/package.json
          CURRENT=$(jq -r '.version' "$PKG")

          # Did this push touch any package source?
          BEFORE='${{ github.event.before }}'
          # On manual / first run there is no "before" — skip the auto-bump.
          if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            CHANGED_PKGS=""
          else
            CHANGED_PKGS=$(git diff --name-only "$BEFORE" HEAD -- 'packages/**' || true)
          fi

          if [[ -n "$CHANGED_PKGS" ]]; then
            NEW=$(node -e "const [a,b,c]=process.argv[1].split('.').map(Number); console.log([a,b,c+1].join('.'))" "$CURRENT")
            echo "Bumping docs $CURRENT -> $NEW (packages changed)"
            jq --arg v "$NEW" '.version=$v' "$PKG" > "$PKG.tmp" && mv "$PKG.tmp" "$PKG"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git add "$PKG"
            git commit -m "chore(documentation): bump to v${NEW} [skip ci]"
            git push origin HEAD:main
            echo "version=$NEW" >> "$GITHUB_OUTPUT"
          else
            echo "No package changes — keeping docs at $CURRENT"
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          fi

      - name: Build monorepo
        run: pnpm build

      - name: Stage standalone bundle
        run: |
          set -euo pipefail
          STAGE="$RUNNER_TEMP/flexi-docs"
          mkdir -p "$STAGE"
          cp -R apps/documentation/.next/standalone/. "$STAGE/"
          mkdir -p "$STAGE/apps/documentation/.next"
          cp -R apps/documentation/.next/static "$STAGE/apps/documentation/.next/static"
          cp -R apps/documentation/public "$STAGE/apps/documentation/public"

      - name: Capture build metadata
        id: meta
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="flexi-documentation-v${VERSION}"
          BUILT_AT=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          {
            echo "version=$VERSION"
            echo "commit=$(git rev-parse HEAD)"
            echo "short_sha=$SHORT_SHA"
            echo "built_at=$BUILT_AT"
            echo "tag=$TAG"
          } > "$RUNNER_TEMP/flexi-docs/BUILD_INFO"
          {
            echo "short_sha=$SHORT_SHA"
            echo "tag=$TAG"
            echo "built_at=$BUILT_AT"
          } >> "$GITHUB_OUTPUT"

      - name: Pack tarball as docs-bundle.tgz
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/flexi-docs"
          tar --owner=0 --group=0 -czf "$RUNNER_TEMP/docs-bundle.tgz" .
          ls -lh "$RUNNER_TEMP/docs-bundle.tgz"

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          SHORT_SHA: ${{ steps.meta.outputs.short_sha }}
          BUILT_AT: ${{ steps.meta.outputs.built_at }}
        run: |
          set -euo pipefail
          ASSET="$RUNNER_TEMP/docs-bundle.tgz"
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          NOTES=$(printf "Built from commit \`%s\` at %s\n\n%s" "$SHORT_SHA" "$BUILT_AT" "$COMMIT_MSG")
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — replacing asset"
            gh release upload "$TAG" "$ASSET" --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "$NOTES" \
              --target "$GITHUB_SHA" \
              --latest \
              "$ASSET"
          fi

      - name: Prune old docs releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          KEEP=5
          gh release list --limit 100 --json tagName,createdAt \
            | jq -r --argjson keep "$KEEP" '
                [.[] | select(.tagName | startswith("flexi-documentation-v"))]
                | sort_by(.createdAt) | reverse
                | .[$keep:][] .tagName
              ' \
            | while read -r tag; do
              [[ -z "$tag" ]] && continue
              echo "Deleting old release: $tag"
              gh release delete "$tag" --yes --cleanup-tag
            done
